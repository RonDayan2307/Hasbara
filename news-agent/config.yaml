model:
  provider: ollama
  name: gemma4:e4b
  base_url: http://localhost:11434
  timeout: 120
  max_retries: 3

scraping:
  interval_minutes: 60
  recency_window_hours: 2
  user_agent: "NewsAgent/1.0 (research; +https://github.com/news-agent)"
  request_delay_min: 1.0
  request_delay_max: 3.0
  respect_robots_txt: true

thresholds:
  ignore_below: 4.0
  store_short_term: 4.0
  report_minimum: 6.0
  high_priority: 8.0
  terminal_alert: 9.0
  claim_extraction_minimum: 7.0

override_triggers:
  - criterion: antisemitic_content
    minimum: 9
  - criterion: misinformation_risk
    minimum: 9
    condition_note: "when concerning Israel, IDF, or Israeli security agencies"
  - criterion: hostile_media_narrative
    minimum: 9

scoring_criteria:
  - israel_political_relevance
  - antisemitic_content
  - anti_zionist_content
  - misinformation_risk
  - war_crimes_accusation
  - sanctions_or_boycott_risk
  - un_or_legal_action
  - hostile_media_narrative
  - diplomatic_incident

content_labels:
  - legitimate_policy_criticism
  - anti_israel_framing
  - anti_zionist_framing
  - antisemitic_content
  - misinformation_or_unverified_claim
  - reputational_crisis
  - incitement_or_threat

retention:
  article_text_days: 14
  debug_payload_days: 14
  topic_active_days: 14
  refetch_after_days: 7

paths:
  database: data/news_agent.db
  reports: reports
  logs: logs
  debug: debug

